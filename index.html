<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>360 Viewer</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* ── 1. ABSOLUTE RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
      --accent: #c8f060; --text: #e8e8e0; --muted: #666; --radius: 4px;
      --sidebar-w: 260px;
    }
    html, body { 
      width: 100%; height: 100%; 
      background: var(--bg); color: var(--text); 
      font-family: 'DM Mono', monospace; 
      overflow: hidden; /* Prevents double scrollbars in Notion */
    }

    /* ── 2. SINGLE MODE (NOTION EMBED) ── */
    /* This forces the viewer to perfectly fill whatever box it is inside of */
    #single-view-container {
      display: none; /* Hidden by default */
      position: absolute;
      inset: 0; /* Snaps to top, left, right, bottom */
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 100;
    }
    #panorama-single {
      width: 100%;
      height: 100%;
    }
    #pop-out-btn {
      position: absolute; top: 16px; right: 16px; z-index: 101;
      background: rgba(14,14,14,0.85); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.75rem; text-decoration: none;
      padding: 8px 12px; transition: all 0.15s;
    }
    #pop-out-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 3. GALLERY MODE (FULL APP) ── */
    #gallery-view-container {
      display: none; /* Hidden by default */
      grid-template-rows: auto 1fr auto;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-areas: "header header" "sidebar viewer" "footer footer";
      height: 100%; width: 100%;
      transition: grid-template-columns 0.25s ease;
    }
    #gallery-view-container.sidebar-collapsed { grid-template-columns: 0px 1fr; }

    /* Gallery Components */
    header { grid-area: header; border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
    #toggle-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 0.85rem; transition: all 0.15s; line-height: 1; flex-shrink: 0; }
    #toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    header h1 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; }
    header .count { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    #sidebar { grid-area: sidebar; border-right: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: opacity 0.2s ease; }
    #sidebar-inner { overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 6px; width: var(--sidebar-w); height: 100%; }
    #gallery-view-container.sidebar-collapsed #sidebar { opacity: 0; pointer-events: none; border-right-color: transparent; }
    #sidebar-inner::-webkit-scrollbar { width: 4px; }
    #sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .scene-btn { background: transparent; border: 1px solid transparent; border-radius: var(--radius); padding: 10px 12px; cursor: pointer; text-align: left; transition: all 0.15s ease; display: flex; flex-direction: column; gap: 3px; width: 100%; }
    .scene-btn:hover { background: var(--surface); border-color: var(--border); }
    .scene-btn.active { background: var(--surface); border-color: var(--accent); }
    .scene-btn .title { font-size: 0.8rem; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .scene-btn.active .title { color: var(--accent); }
    
    .copy-link { font-size: 0.68rem; color: var(--muted); background: none; border: none; padding: 0; cursor: pointer; font-family: 'DM Mono', monospace; text-align: left; transition: color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .copy-link:hover, .copy-link.copied { color: var(--accent); }

    #viewer-wrap { grid-area: viewer; position: relative; overflow: hidden; }
    #panorama-gallery { width: 100%; height: 100%; }

    #scene-label { position: absolute; top: 16px; left: 16px; background: rgba(14,14,14,0.75); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-family: 'Instrument Serif', serif; font-size: 1.1rem; pointer-events: none; }

    footer { grid-area: footer; border-top: 1px solid var(--border); padding: 8px 24px; display: flex; align-items: center; justify-content: space-between; }
    footer p { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; }
    footer kbd { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; color: var(--text); }

    #status { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted); font-size: 0.8rem; text-align: center; }
    #status .big { font-family: 'Instrument Serif', serif; font-size: 2rem; color: var(--border); }

    /* Pannellum control overrides */
    .pnlm-controls-container { bottom: 24px !important; right: 16px !important; top: auto !important; }
    .pnlm-control { background: rgba(255,255,255,0.95) !important; border: 1px solid rgba(0,0,0,0.15) !important; border-radius: var(--radius) !important; box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important; }
    .pnlm-control:hover { background: #ffffff !important; border-color: var(--accent) !important; }
    .pnlm-sprite { filter: none !important; }
  </style>
</head>
<body>

<div id="single-view-container">
  <div id="panorama-single"></div>
  <a id="pop-out-btn" target="_blank">⧉ Open Full Screen</a>
</div>

<div id="gallery-view-container">
  <header>
    <button id="toggle-btn" title="Toggle sidebar">☰</button>
    <h1>360° Viewer</h1>
    <span class="count" id="count-label"></span>
  </header>
  <nav id="sidebar"><div id="sidebar-inner"></div></nav>
  <div id="viewer-wrap">
    <div id="panorama-gallery"></div>
    <div id="scene-label"></div>
    <div id="status"><div class="big">⟳</div><p>Loading…</p></div>
  </div>
  <footer>
    <p>Drag to look around &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; <kbd>↑</kbd><kbd>↓</kbd> navigate</p>
    <p id="scene-index-label"></p>
  </footer>
</div>

<script>
  // ════════════════════════════════════════════
  // CONFIGURATION
  // ════════════════════════════════════════════
  const GITHUB_USER = "sj-law";
  const GITHUB_REPO = "360photos";
  const PHOTOS_DIR  = "photos";
  const BRANCH      = "main";
  const IMAGE_EXTS  = ['.jpg', '.jpeg', '.png', '.webp'];

  let rawBase = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${PHOTOS_DIR}/`;
  const pageBase = `${location.origin}${location.pathname}`;

  let viewer = null;
  let scenes = [];
  let currentIndex = 0;

  // Utilities
  function prettifyName(filename) {
    return filename.replace(/\.[^.]+$/, '').replace(/[_\-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  function copyToClipboard(text, btn, label) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = label; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── ROUTER LOGIC ──────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const photoParam = params.get('photo');

  if (photoParam) {
    initSingleMode(photoParam);
  } else {
    initGalleryMode();
  }

  // ── 1. SINGLE MODE LOGIC ──────────────────────────────────────
  function initSingleMode(filename) {
    // Show single UI, hide gallery UI
    document.getElementById('single-view-container').style.display = 'block';
    document.getElementById('gallery-view-container').style.display = 'none';

    // Set pop-out button link
    document.getElementById('pop-out-btn').href = `${pageBase}?photo=${encodeURIComponent(filename)}`;

    const fileUrl = rawBase + encodeURIComponent(filename);
    
    // Load Pannellum strictly into the #panorama-single div
    viewer = pannellum.viewer('panorama-single', {
      type: 'equirectangular',
      panorama: fileUrl,
      autoLoad: true,
      showControls: true,
      mouseZoom: true,
      hfov: 100, minHfov: 50, maxHfov: 120,
    });
  }

  // ── 2. GALLERY MODE LOGIC ─────────────────────────────────────
  async function initGalleryMode() {
    // Show gallery UI, hide single UI
    document.getElementById('gallery-view-container').style.display = 'grid';
    document.getElementById('single-view-container').style.display = 'none';

    // Sidebar Toggle
    document.getElementById('toggle-btn').addEventListener('click', () => {
      document.getElementById('gallery-view-container').classList.toggle('sidebar-collapsed');
    });

    const status = document.getElementById('status');
    const branches = BRANCH === 'main' ? ['main', 'master'] : ['master', 'main'];
    let files = null;

    for (const branch of branches) {
      const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${PHOTOS_DIR}?ref=${branch}`;
      try {
        const res = await fetch(apiUrl);
        if (res.status === 404) continue;
        if (!res.ok) { status.innerHTML = `<div class="big">✕</div><p>GitHub API returned ${res.status}.</p>`; return; }
        files = await res.json();
        rawBase = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${branch}/${PHOTOS_DIR}/`;
        break;
      } catch (err) {
        status.innerHTML = `<div class="big">✕</div><p>Network error.</p>`; return;
      }
    }

    if (!files) { status.innerHTML = `<div class="big">✕</div><p>Couldn't find files.</p>`; return; }

    const images = files.filter(f => f.type === 'file' && IMAGE_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)));
    scenes = images.map(f => ({
      title: prettifyName(f.name),
      file: rawBase + encodeURIComponent(f.name),
      filename: f.name,
      directUrl: `${pageBase}?photo=${encodeURIComponent(f.name)}`
    }));

    document.getElementById('count-label').textContent = `${scenes.length} photo${scenes.length !== 1 ? 's' : ''}`;
    const sidebarEl = document.getElementById('sidebar-inner');

    scenes.forEach((scene, i) => {
      const btn = document.createElement('button');
      btn.className = 'scene-btn';
      btn.innerHTML = `<span class="title">${scene.title}</span>`;
      
      const linkEl = document.createElement('button');
      linkEl.className = 'copy-link';
      linkEl.textContent = scene.filename;
      linkEl.title = 'Copy direct link';
      linkEl.addEventListener('click', e => {
        e.stopPropagation();
        copyToClipboard(scene.directUrl, linkEl, scene.filename);
      });

      btn.appendChild(linkEl);
      btn.addEventListener('click', () => loadGalleryScene(i));
      sidebarEl.appendChild(btn);
    });

    if(scenes.length > 0) loadGalleryScene(0);
  }

  function loadGalleryScene(index) {
    index = ((index % scenes.length) + scenes.length) % scenes.length;
    currentIndex = index;
    const scene = scenes[index];
    
    document.querySelectorAll('.scene-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
    document.getElementById('scene-index-label').textContent = `${index + 1} / ${scenes.length}`;
    document.getElementById('scene-label').textContent = scene.title;
    document.getElementById('status').style.display = 'none';

    if (viewer) viewer.destroy();
    
    viewer = pannellum.viewer('panorama-gallery', {
      type: 'equirectangular',
      panorama: scene.file,
      autoLoad: true,
      showControls: true,
      mouseZoom: true,
      hfov: 100, minHfov: 50, maxHfov: 120,
    });
  }

  // Gallery keyboard nav
  document.addEventListener('keydown', e => {
    if (!scenes.length || document.getElementById('gallery-view-container').style.display === 'none') return;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') loadGalleryScene(currentIndex + 1);
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  loadGalleryScene(currentIndex - 1);
  });
</script>
</body>
</html>
