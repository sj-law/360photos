<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>360 Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
      --accent: #c8f060; --text: #e8e8e0; --muted: #666; --radius: 4px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

    /* ── FULL VIEWER LAYOUT ── */
    body.full-layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 260px 1fr;
      grid-template-areas: "header header" "sidebar viewer" "footer footer";
      height: 100vh; overflow: hidden;
    }
    /* ── SINGLE PHOTO LAYOUT ── */
    body.single-layout {
      display: grid;
      grid-template-rows: 1fr;
      grid-template-columns: 1fr;
      grid-template-areas: "viewer";
      height: 100vh; overflow: hidden;
    }

    header {
      grid-area: header; border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: baseline; gap: 12px;
    }
    header h1 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; }
    header span { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    #sidebar {
      grid-area: sidebar; border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 6px;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .scene-btn {
      background: transparent; border: 1px solid transparent; border-radius: var(--radius);
      padding: 10px 12px; cursor: pointer; text-align: left; transition: all 0.15s ease;
      display: flex; flex-direction: column; gap: 3px;
    }
    .scene-btn:hover { background: var(--surface); border-color: var(--border); }
    .scene-btn.active { background: var(--surface); border-color: var(--accent); }
    .scene-btn .title { font-size: 0.8rem; color: var(--text); font-weight: 500; }
    .scene-btn.active .title { color: var(--accent); }
    .scene-btn .subtitle { font-size: 0.68rem; color: var(--muted); }

    #viewer-wrap { grid-area: viewer; position: relative; overflow: hidden; }
    #panorama { width: 100%; height: 100%; }

    .pnlm-controls-container { bottom: 40px !important; right: 12px !important; top: auto !important; }
    .pnlm-control { background: var(--surface) !important; border: 1px solid var(--border) !important; }
    .pnlm-control:hover { border-color: var(--accent) !important; }
    .pnlm-sprite { filter: invert(1) brightness(0.7); }

    #scene-label {
      position: absolute; top: 16px; left: 16px;
      background: rgba(14,14,14,0.75); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px 14px; font-family: 'Instrument Serif', serif; font-size: 1.1rem;
      pointer-events: none;
    }

    footer {
      grid-area: footer; border-top: 1px solid var(--border);
      padding: 8px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    footer p { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; }
    footer kbd {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--text);
    }

    #status {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 12px;
      color: var(--muted); font-size: 0.8rem; text-align: center; line-height: 1.6;
    }
    #status .big { font-family: 'Instrument Serif', serif; font-size: 2rem; color: var(--border); }
    #status code { color: var(--accent); }

    .dot-loader { display: flex; gap: 6px; }
    .dot-loader span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: bounce 1s infinite ease-in-out;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.15s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;} }
  </style>
</head>
<body>

<!-- Shown only in full-viewer mode -->
<header id="header">
  <h1>360° Viewer</h1>
  <span id="count-label"></span>
</header>

<nav id="sidebar"></nav>

<div id="viewer-wrap">
  <div id="panorama"></div>
  <div id="scene-label"></div>
  <div id="status">
    <div class="big">⟳</div>
    <div class="dot-loader"><span></span><span></span><span></span></div>
    <p>Loading…</p>
  </div>
</div>

<!-- Shown only in full-viewer mode -->
<footer id="footer">
  <p>Drag to look around &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; <kbd>↑</kbd><kbd>↓</kbd> navigate scenes</p>
  <p id="scene-index-label"></p>
</footer>

<script>
  // ════════════════════════════════════════════
  //  ✏️  SET THESE ONCE — then never touch again
  // ════════════════════════════════════════════
  const GITHUB_USER = "sj-law";
  const GITHUB_REPO = "360photos";
  const PHOTOS_DIR  = "photos";
  const BRANCH      = "main";
  // ════════════════════════════════════════════

  const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.webp'];
  const rawBase    = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${PHOTOS_DIR}/`;

  const sidebar       = document.getElementById('sidebar');
  const sceneLabel    = document.getElementById('scene-label');
  const sceneIdxLabel = document.getElementById('scene-index-label');
  const countLabel    = document.getElementById('count-label');
  const status        = document.getElementById('status');

  let viewer = null;
  let scenes = [];
  let currentIndex = 0;

  function prettifyName(filename) {
    return filename
      .replace(/\.[^.]+$/, '')
      .replace(/[_\-]+/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function showError(html) {
    status.innerHTML = `<div class="big">✕</div><p>${html}</p>`;
  }

  function loadViewer(fileUrl, title) {
    if (viewer) viewer.destroy();
    status.style.display = 'none';
    sceneLabel.textContent = title;
    viewer = pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: fileUrl,
      autoLoad: true,
      showControls: true,
      mouseZoom: true,
      hfov: 100, minHfov: 50, maxHfov: 120,
    });
  }

  // ── SINGLE PHOTO MODE ──────────────────────────────────────────
  // Triggered by ?photo=filename.jpg in the URL
  function initSingleMode(filename) {
    document.body.className = 'single-layout';
    document.getElementById('header').style.display  = 'none';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('footer').style.display  = 'none';
    sceneLabel.style.display = 'none'; // no label needed in embed mode

    const fileUrl = rawBase + encodeURIComponent(filename);
    loadViewer(fileUrl, prettifyName(filename));
  }

  // ── FULL VIEWER MODE ───────────────────────────────────────────
  async function initFullMode() {
    document.body.className = 'full-layout';
    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${PHOTOS_DIR}?ref=${BRANCH}`;

    try {
      const res = await fetch(apiUrl);
      if (res.status === 404) { showError(`Folder <code>${PHOTOS_DIR}/</code> not found in your repo.`); return; }
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);

      const files = await res.json();
      const images = files.filter(f =>
        f.type === 'file' && IMAGE_EXTS.some(ext => f.name.toLowerCase().endsWith(ext))
      );

      if (!images.length) { showError(`No images found in <code>${PHOTOS_DIR}/</code>.`); return; }

      scenes = images.map(f => ({
        title:    prettifyName(f.name),
        file:     rawBase + encodeURIComponent(f.name),
        filename: f.name
      }));

      countLabel.textContent = `${scenes.length} photo${scenes.length !== 1 ? 's' : ''}`;

      scenes.forEach((scene, i) => {
        const btn = document.createElement('button');
        btn.className = 'scene-btn';
        btn.innerHTML = `<span class="title">${scene.title}</span><span class="subtitle">${scene.filename}</span>`;
        btn.addEventListener('click', () => loadScene(i));
        sidebar.appendChild(btn);
      });

      loadScene(0);

    } catch (err) {
      showError(`Couldn't reach GitHub API. Check <code>GITHUB_USER</code> and <code>GITHUB_REPO</code>.`);
      console.error(err);
    }
  }

  function loadScene(index) {
    index = ((index % scenes.length) + scenes.length) % scenes.length;
    currentIndex = index;
    const scene = scenes[index];
    document.querySelectorAll('.scene-btn').forEach((btn, i) =>
      btn.classList.toggle('active', i === index)
    );
    sceneIdxLabel.textContent = `${index + 1} / ${scenes.length}`;
    loadViewer(scene.file, scene.title);
  }

  document.addEventListener('keydown', e => {
    if (!scenes.length) return;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') loadScene(currentIndex + 1);
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  loadScene(currentIndex - 1);
  });

  // ── ROUTER ────────────────────────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const photoParam = params.get('photo');

  if (photoParam) {
    initSingleMode(photoParam);
  } else {
    initFullMode();
  }
</script>
</body>
</html>
